<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Data Table</title>
  <style>
    :root {
      --fp-navy: #001F45;
      --fp-steel: #336699;
      --fp-white: #FFFFFF;
      --fp-off-white: #F2F2F2;
      --fp-light-gray: #E6E6E6;
      --fp-gray: #7F7F7F;
      --fp-negative: #C00000;
      --fp-positive: #00B050;
      --fp-font: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--fp-font);
      background: var(--fp-white);
      color: var(--fp-navy);
      overflow: hidden;
    }
    .main {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-radius: var(--border-radius-lg, 8px);
      overflow: hidden;
    }
    .main.fullscreen { border-radius: 0; }

    .table-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--fp-off-white);
      border-bottom: 1px solid var(--fp-light-gray);
      flex-shrink: 0;
    }
    .table-title {
      font-size: 14px;
      font-weight: bold;
      color: var(--fp-navy);
      flex: 1;
    }
    .table-count {
      font-size: 11px;
      color: var(--fp-gray);
    }
    .filter-input {
      font-family: var(--fp-font);
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid var(--fp-light-gray);
      border-radius: 4px;
      width: 180px;
      outline: none;
    }
    .filter-input:focus { border-color: var(--fp-steel); }

    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    thead { position: sticky; top: 0; z-index: 2; }
    th {
      background: var(--fp-navy);
      color: var(--fp-white);
      font-weight: bold;
      text-align: left;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { background: var(--fp-steel); }
    th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: 0.6; }
    th.sorted .sort-arrow { opacity: 1; }

    td {
      padding: 6px 12px;
      border-bottom: 1px solid var(--fp-light-gray);
      white-space: nowrap;
    }
    tr:nth-child(even) td { background: var(--fp-off-white); }
    tr:hover td { background: var(--fp-light-gray); }

    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--fp-light-gray);
      border-radius: 4px;
      padding: 4px;
      cursor: pointer;
      line-height: 0;
      display: none;
    }

    .error-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--fp-negative);
      font-size: 14px;
      padding: 24px;
      text-align: center;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--fp-gray);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="loading" id="loading">Loading table data...</div>
    <div class="table-header" id="table-header" style="display:none">
      <div class="table-title" id="table-title"></div>
      <div class="table-count" id="table-count"></div>
      <input class="filter-input" id="filter-input" type="text" placeholder="Filter rows...">
    </div>
    <div class="table-wrap" id="table-wrap" style="display:none">
      <table id="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <button class="fullscreen-btn" id="fullscreen-btn" title="Toggle fullscreen">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--fp-navy)" stroke-width="1.5">
        <polyline points="10,2 14,2 14,6"/><polyline points="6,14 2,14 2,10"/>
        <line x1="14" y1="2" x2="10" y2="6"/><line x1="2" y1="14" x2="6" y2="10"/>
      </svg>
    </button>
    <div class="error-msg" id="error-msg" style="display:none"></div>
  </div>
  <script type="module" src="/src/data-table.ts"></script>
</body>
</html>
